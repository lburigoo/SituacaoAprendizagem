<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores - Sistema EPIs</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <h1>Gerenciamento de <span>EPIs</span></h1>
        </div>
    </header>

    <nav class="menu">
        <div class="container">
            <a href="/">Início</a>
            <a href="/pages/colaboradores.html" class="active">Colaboradores</a>
            <a href="/pages/epis.html">EPIs</a>
            <a href="/pages/emprestimos.html">Empréstimos</a>
        </div>
    </nav>

    <div class="container">

        <div class="page-title">
            <h2>Colaboradores</h2>
            <button class="btn btn-primary" onclick="abrirModal()">+ Novo Colaborador</button>
        </div>

        <!-- area de mensagens -->
        <div id="mensagem"></div>

        <!-- barra de pesquisa -->
        <div class="search-bar">
            <input type="text" id="campoBusca" placeholder="Buscar por nome..." onkeyup="buscarColaboradores()">
            <button class="btn btn-primary" onclick="buscarColaboradores()">Pesquisar</button>
        </div>

        <!-- tabela de colaboradores -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Cargo</th>
                        <th>Setor</th>
                        <th>Telefone</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaColaboradores">
                    <tr><td colspan="8" class="loading">Carregando...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- MODAL - formulario de cadastro/edicao -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitulo">Novo Colaborador</h3>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>

            <form id="formColaborador">
                <input type="hidden" id="colaboradorId">

                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" required placeholder="Nome completo">
                </div>

                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" placeholder="Cargo do colaborador">
                </div>

                <div class="form-group">
                    <label for="setor">Setor</label>
                    <input type="text" id="setor" placeholder="Setor de trabalho">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="ativo" checked> Ativo
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>Sistema de Gerenciamento de EPIs &copy; 2026</p>
    </footer>

    <script src="/js/colaboradores.js"></script>
</body>
</html>
